meta_data:
  exp_name: "ma_imf_mamujoco_disp"
  script_path: "run_scripts/train.py"
  num_workers: 1
  job_name: "{dataset}/h_{horizon}-hh_{history_horizon}-{model}-r_{returns_scale}-ctde_{decentralized_execution}-imf-disp"
variables:
  seed: [100, 200, 300, 400, 500]

  horizon: [10]
  history_horizon: [18]

  returns_scale: [100.0]
  dataset: ["2halfcheetah-Poor"]
  condition_guidance_w: [1.2]

constants:
  # misc
  env_type: "mamujoco"
  n_agents: 2
  use_action: True
  discrete_action: False
  residual_attn: True
  decentralized_execution: True
  use_zero_padding: False
  pred_future_padding: True
  use_ddim_sample: False
  n_ddim_steps: 5

  # model
  model: "models.SharedConvAttentionDeconv"
  diffusion: "models.MAMeanFlowWrapper"
  use_dispersive_loss: True
  dispersive_loss_weight: 0.5
  dispersive_loss_temperature: 0.5
  dispersive_loss_type: "infonce_l2"
  dispersive_loss_layer: "early"
  share_inv: True
  n_diffusion_steps: 5
  action_weight: 10
  loss_weights: null
  loss_discount: 1
  use_return_to_go: False
  dim_mults: [1, 4, 8]
  returns_condition: True
  env_ts_condition: False
  predict_epsilon: False
  dim: 128
  hidden_dim: 256
  condition_dropout: 0.25
  condition_guidance_w: 1.2
  train_only_inv: False
  clip_denoised: True
  test_ret: 0.9
  renderer: "utils.MAMuJoCoRenderer"

  # dataset
  loader: "datasets.SequenceDataset"
  normalizer: "CDFNormalizer"
  max_n_episodes: 5000
  preprocess_fns: []
  use_padding: True
  discount: 0.99
  max_path_length: 1000
  termination_penalty: 0.0

  # training
  n_steps_per_epoch: 10000
  n_train_steps: 250000
  batch_size: 32
  learning_rate: 0.0002
  gradient_accumulate_every: 2
  ema_decay: 0.995
  log_freq: 1000
  save_freq: 50000
  sample_freq: 0
  n_saves: 5
  save_parallel: False
  n_reference: 3
  save_checkpoints: True

  enable_gradient_monitor_console: False
  use_wandb: False
  wandb_project: "coflow"
  wandb_run_name: "2halfcheetah-ctde-poor_history-imf-disp"
  wandb_tags: ['imf', 'mamujoco', '2halfcheetah', 'poor_history', 'disp']

  # eval
  evaluator: "utils.MADEvaluator"
  num_eval: 10
  num_envs: 10
  eval_freq: 50000

  # load checkpoint
  continue_training: True
  use_improved_meanflow: True
  flow_ratio: 0.5
  gamma: 0.5
  c: 0.001
  use_adaptive_loss: False
  max_denoising_steps: 5
  act_min: -1.0
  act_max: 1.0