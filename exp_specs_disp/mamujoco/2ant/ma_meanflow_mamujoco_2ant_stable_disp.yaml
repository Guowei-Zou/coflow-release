meta_data:
  exp_name: "ma_meanflow_mamujoco"
  script_path: "run_scripts/train.py"
  num_workers: 1
  job_name: "{dataset}/h_{horizon}-hh_{history_horizon}-{model}-r_{returns_scale}-dl_{loader}-ctde_{decentralized_execution}-meanflow-stable"

variables:
  seed: [100, 200, 300, 400, 500]

  horizon: [10]
  history_horizon: [18]

  returns_scale: [380.0]
  dataset: ["2ant-Good"]
  condition_guidance_w: [1.2]

constants:
  # misc
  env_type: "mamujoco"
  n_agents: 2
  use_action: True
  discrete_action: False
  residual_attn: True
  decentralized_execution: False
  use_zero_padding: False
  pred_future_padding: True
  use_ddim_sample: False
  n_ddim_steps: 5

  # model
  model: "models.SharedConvAttentionDeconv"
  diffusion: "models.MAMeanFlowWrapper"
  use_dispersive_loss: True
  dispersive_loss_weight: 0.5
  dispersive_loss_temperature: 0.5
  dispersive_loss_type: "infonce_l2"
  dispersive_loss_layer: "early"
  share_inv: True
  n_diffusion_steps: 5
  action_weight: 10
  loss_weights: null
  loss_discount: 1
  use_return_to_go: False
  dim_mults: [1, 4, 8]
  returns_condition: True
  env_ts_condition: False
  predict_epsilon: False
  dim: 128
  hidden_dim: 256
  condition_dropout: 0.25
  condition_guidance_w: 1.2
  train_only_inv: False
  clip_denoised: True
  test_ret: 1.0
  renderer: "utils.MAMuJoCoRenderer"

  # dataset
  loader: "datasets.SequenceDataset"
  normalizer: "CDFNormalizer"
  max_n_episodes: 5000
  preprocess_fns: []
  use_padding: True
  discount: 0.99
  max_path_length: 1000
  termination_penalty: 0.0

  # training - 稳定训练设置
  n_steps_per_epoch: 10000
  n_train_steps: 500000
  batch_size: 32
  learning_rate: 0.00005  # 降低学习率，从0.0002降到0.00005
  gradient_accumulate_every: 2
  gradient_clip_norm: 1.0  # 添加梯度裁剪
  ema_decay: 0.995
  log_freq: 100  # 增加日志频率以更好地监控
  save_freq: 50000  # 更频繁地保存检查点
  sample_freq: 0
  n_saves: 10
  save_parallel: False
  n_reference: 3
  save_checkpoints: True
  enable_gradient_monitor_console: False
  use_wandb: False
  wandb_project: "coflow"
  wandb_run_name: "2ant-stable-disp"
  wandb_tags: ["meanflow", "mamujoco", "2ant", "stable"]

  # eval
  evaluator: "utils.MADEvaluator"
  num_eval: 10
  num_envs: 10
  eval_freq: 50000  # 更频繁地评估

  # load checkpoint
  continue_training: True
  # MeanFlow算法稳定设置
  flow_ratio: 0.3  # 降低flow consistency ratio，提高训练稳定性
  gamma: 0.7      # 调整adaptive loss参数
  c: 0.01         # 增加stability constant
  use_adaptive_loss: True  # 启用自适应损失
  max_denoising_steps: 3   # 降低推理步数提高稳定性
  act_min: -1.0
  act_max: 1.0