meta_data:
  exp_name: "ma_meanflow_smac"
  script_path: "run_scripts/train.py"
  num_workers: 1
  job_name: "{dataset}/h_{horizon}-hh_{history_horizon}-{model}-r_{returns_scale}-guidew_{condition_guidance_w}-ctde_{decentralized_execution}-meanflow"
variables:
  seed: [100, 200, 300, 400, 500]

  horizon: [4]
  history_horizon: [20]

  returns_scale: [12]
  dataset: ["5m_vs_6m-Poor"]
  condition_guidance_w: [1.2]

constants:
  # misc
  env_type: "smac"
  n_agents: 5
  use_action: True
  discrete_action: True
  residual_attn: True
  decentralized_execution: True
  use_zero_padding: False
  pred_future_padding: True
  use_ddim_sample: False
  n_ddim_steps: 5

  # model
  model: "models.SharedConvAttentionDeconv"
  diffusion: "models.MAMeanFlowWrapper"
  share_inv: True
  n_diffusion_steps: 5
  action_weight: 10
  loss_weights: null
  loss_discount: 1
  use_return_to_go: True
  dim_mults: [1, 4, 8]
  returns_condition: True
  predict_epsilon: False
  calc_energy: False
  dim: 128
  hidden_dim: 256
  condition_dropout: 0.25
  condition_guidance_w: 1.2
  train_only_inv: False
  clip_denoised: True
  test_ret: 1.0
  renderer: "utils.SMACRenderer"

  # dataset
  loader: "datasets.SequenceDataset"
  normalizer: "CDFNormalizer"
  max_n_episodes: 50000
  preprocess_fns: []
  use_padding: True
  discount: 0.99
  max_path_length: 70
  termination_penalty: 0.0

  # training
  n_steps_per_epoch: 10000
  n_train_steps: 1000000
  batch_size: 32
  learning_rate: 0.0002
  gradient_accumulate_every: 2
  ema_decay: 0.995
  log_freq: 1000
  save_freq: 50000
  sample_freq: 10000
  n_saves: 5
  save_parallel: False
  n_reference: 3
  save_checkpoints: True

  enable_gradient_monitor_console: False
  use_wandb: False
  wandb_project: "coflow"
  wandb_run_name: "5m6m-ctde-poor_history"
  wandb_tags: ['meanflow', 'smac', '5m6m', 'poor_history']

  # eval
  evaluator: "utils.MADEvaluator"
  num_envs: 10
  num_eval: 100
  eval_freq: 50000

  # load checkpoint
  continue_training: True
  flow_ratio: 0.5
  gamma: 0.5
  c: 0.001
  use_adaptive_loss: False
  max_denoising_steps: 5
  act_min: -1.0
  act_max: 1.0